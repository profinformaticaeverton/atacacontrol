<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AtacaControl</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div class="card">
    <div class="logo">🛒</div>
    <h1>AtacaControl</h1>
    <p class="subtitle">Controle inteligente de compras em atacado</p>

    <div id="loginArea">
        <h2>Entrar</h2>
        <input type="email" id="email" placeholder="Seu e-mail">
        <input type="password" id="password" placeholder="Sua senha">
        <button class="btn-primary" onclick="login()">Entrar</button>

        <button class="btn-link" onclick="toggleRegister()">
            Criar nova conta
        </button>
    </div>

    <div id="registerArea" class="hidden">
        <h2>Criar Conta</h2>
        <input type="email" id="newEmail" placeholder="Seu e-mail">
        <input type="password" id="newPassword" placeholder="Sua senha">
        <button class="btn-success" onclick="register()">Cadastrar</button>

        <button class="btn-link" onclick="toggleRegister()">
            Já possuo conta
        </button>
    </div>

    <div id="msg"></div>
</div>

<script src="config.js"></script>
<script src="app.js"></script>
</body>
</html>
