<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>AtacaControl</title>

<link rel="icon" href="favicon.svg">

<link rel="stylesheet" href="style.css">

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>

<body>

<div class="container">

    <div class="logo">

        <div class="icon">🛒</div>

        <h1>AtacaControl</h1>

        <p>
            Controle inteligente de compras
        </p>

    </div>

    <div class="tabs">

        <button
            id="btnLogin"
            class="active"
            onclick="mostrarLogin()">

            Entrar

        </button>

        <button
            id="btnCadastro"
            onclick="mostrarCadastro()">

            Criar Conta

        </button>

    </div>

    <div id="loginBox">

        <input
            type="email"
            id="email"
            placeholder="E-mail">

        <input
            type="password"
            id="password"
            placeholder="Senha">

        <button
            class="btn-primary"
            onclick="login()">

            Entrar

        </button>

    </div>

    <div
        id="cadastroBox"
        style="display:none">

        <input
            type="email"
            id="newEmail"
            placeholder="E-mail">

        <input
            type="password"
            id="newPassword"
            placeholder="Senha">

        <button
            class="btn-success"
            onclick="register()">

            Criar Conta

        </button>

    </div>

    <div id="msg"></div>

</div>

<script src="config.js"></script>
<script src="app.js"></script>

</body>
</html>
