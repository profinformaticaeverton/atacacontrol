<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tem no Entorno Sul - Usuários</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-100 p-6">

<div class="max-w-7xl mx-auto">
    <div class="bg-white rounded-lg shadow p-6 mb-6">
        <h1 class="text-2xl font-bold text-green-700">🌿 Tem no Entorno Sul - Usuários</h1>
        <p class="text-gray-600">Cadastro completo com gênero (Portaria nº 2.815/2020)</p>
    </div>

    <!-- Formulário de cadastro/edição -->
    <div class="bg-white rounded-lg shadow p-6 mb-6">
        <h2 class="text-xl font-semibold mb-4" id="formTitle">➕ Novo usuário</h2>
        <form id="userForm" class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <input type="hidden" id="userId">
            <div><label class="block font-medium">Nome *</label><input type="text" id="nome" required class="w-full border rounded px-3 py-2"></div>
            <div><label class="block font-medium">Sobrenome</label><input type="text" id="sobrenome" class="w-full border rounded px-3 py-2"></div>
            <div><label class="block font-medium">Data Nascimento</label><input type="date" id="data_nascimento" class="w-full border rounded px-3 py-2"></div>
            <div><label class="block font-medium">Gênero</label>
                <select id="genero" class="w-full border rounded px-3 py-2">
                    <option value="">Selecione</option>
                    <option value="masculino">Masculino</option>
                    <option value="feminino">Feminino</option>
                    <option value="nao_binario">Não binário</option>
                    <option value="prefiro_nao_informar">Prefiro não informar</option>
                </select>
            </div>
            <div><label class="block font-medium">WhatsApp</label><input type="tel" id="whatsapp" class="w-full border rounded px-3 py-2" placeholder="(61) 99999-9999"></div>
            <div><label class="block font-medium">Email *</label><input type="email" id="email" required class="w-full border rounded px-3 py-2"></div>
            <div><label class="block font-medium">Status</label>
                <select id="status" class="w-full border rounded px-3 py-2">
                    <option value="ativo">Ativo</option>
                    <option value="inativo">Inativo</option>
                </select>
            </div>
            <div class="md:col-span-2 flex gap-2">
                <button type="submit" class="bg-green-600 text-white px-4 py-2 rounded hover:bg-green-700">Salvar</button>
                <button type="button" id="cancelEdit" class="bg-gray-400 text-white px-4 py-2 rounded hidden">Cancelar</button>
            </div>
        </form>
        <div id="formMessage" class="mt-3 text-sm hidden"></div>
    </div>

    <!-- Tabela de usuários -->
    <div class="bg-white rounded-lg shadow overflow-hidden">
        <h2 class="text-xl font-semibold p-4 border-b">📋 Usuários cadastrados</h2>
        <div class="overflow-x-auto">
            <table class="min-w-full divide-y divide-gray-200">
                <thead class="bg-gray-50">
                    <tr>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Nome</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Email</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">WhatsApp</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Nascimento</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Gênero</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Status</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Ações</th>
                    </tr>
                </thead>
                <tbody id="userTableBody" class="bg-white divide-y divide-gray-200">
                    <tr><td colspan="7" class="text-center py-4">Carregando...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- Modal de exclusão -->
<div id="deleteModal" class="fixed inset-0 bg-gray-600 bg-opacity-50 hidden items-center justify-center">
    <div class="bg-white rounded-lg p-6 max-w-sm">
        <h3 class="text-lg font-bold mb-4">Confirmar exclusão</h3>
        <p>Deseja excluir <span id="deleteUserName" class="font-semibold"></span>?</p>
        <div class="flex justify-end gap-2 mt-4">
            <button id="confirmDelete" class="bg-red-600 text-white px-4 py-2 rounded">Excluir</button>
            <button id="cancelDelete" class="bg-gray-400 text-white px-4 py-2 rounded">Cancelar</button>
        </div>
    </div>
</div>

<script>
    // ==================== CREDENCIAIS DO NOVO PROJETO ====================
    const SUPABASE_URL = "https://cznssxxzdiqldrrfmxrb.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_e1EeFJCSP5Ynhu2gqyMCAQ_gqOJry8U"; // Substitua pela chave completa!

    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // ==================== FUNÇÕES ====================
    let deleteUserId = null;

    function formatarData(dataISO) {
        if (!dataISO) return '-';
        const [ano, mes, dia] = dataISO.split('-');
        return `${dia}/${mes}/${ano}`;
    }

    function exibirGenero(valor) {
        const mapa = {
            'masculino': 'Masculino',
            'feminino': 'Feminino',
            'nao_binario': 'Não binário',
            'prefiro_nao_informar': 'Prefiro não informar'
        };
        return mapa[valor] || '-';
    }

    function escapeHtml(texto) {
        if (!texto) return '';
        return texto.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    async function carregarUsuarios() {
        const { data, error } = await supabase
            .from('usuarios')
            .select('*')
            .order('created_at', { ascending: false });

        const tbody = document.getElementById('userTableBody');
        if (error) {
            tbody.innerHTML = `<tr><td colspan="7" class="text-center text-red-500">Erro: ${error.message}</td></tr>`;
            return;
        }
        if (!data || data.length === 0) {
            tbody.innerHTML = '<tr><td colspan="7" class="text-center">Nenhum usuário cadastrado.</td></tr>';
            return;
        }
        let html = '';
        for (const u of data) {
            html += `
                <tr>
                    <td class="px-6 py-4 whitespace-nowrap">${escapeHtml(u.nome)} ${escapeHtml(u.sobrenome || '')}</td>
                    <td class="px-6 py-4 whitespace-nowrap">${escapeHtml(u.email)}</td>
                    <td class="px-6 py-4 whitespace-nowrap">${escapeHtml(u.whatsapp || '-')}</td>
                    <td class="px-6 py-4 whitespace-nowrap">${formatarData(u.data_nascimento)}</td>
                    <td class="px-6 py-4 whitespace-nowrap">${exibirGenero(u.genero)}</td>
                    <td class="px-6 py-4 whitespace-nowrap">
                        <span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full ${u.status === 'ativo' ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800'}">
                            ${u.status === 'ativo' ? 'Ativo' : 'Inativo'}
                        </span>
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm">
                        <button onclick="editarUsuario('${u.id}')" class="text-indigo-600 hover:text-indigo-900 mr-3">Editar</button>
                        <button onclick="confirmarExclusao('${u.id}', '${escapeHtml(u.nome)} ${escapeHtml(u.sobrenome || '')}')" class="text-red-600 hover:text-red-900">Excluir</button>
                    </td>
                </tr>
            `;
        }
        tbody.innerHTML = html;
    }

    async function salvarUsuario(event) {
        event.preventDefault();
        const msgDiv = document.getElementById('formMessage');
        msgDiv.classList.add('hidden');

        const userId = document.getElementById('userId').value;
        const nome = document.getElementById('nome').value.trim();
        const sobrenome = document.getElementById('sobrenome').value.trim();
        const data_nascimento = document.getElementById('data_nascimento').value;
        const genero = document.getElementById('genero').value;
        const whatsapp = document.getElementById('whatsapp').value.trim();
        const email = document.getElementById('email').value.trim();
        const status = document.getElementById('status').value;

        if (!nome || !email) {
            msgDiv.className = 'mt-3 text-sm text-red-600';
            msgDiv.innerText = 'Nome e email são obrigatórios.';
            msgDiv.classList.remove('hidden');
            return;
        }

        const dados = {
            nome,
            sobrenome: sobrenome || null,
            data_nascimento: data_nascimento || null,
            genero: genero || null,
            whatsapp: whatsapp || null,
            email,
            status,
            updated_at: new Date().toISOString()
        };

        let error = null;
        if (userId) {
            const { error: err } = await supabase.from('usuarios').update(dados).eq('id', userId);
            error = err;
            if (!error) alert('Usuário atualizado!');
        } else {
            dados.created_at = new Date().toISOString();
            const { error: err } = await supabase.from('usuarios').insert([dados]);
            error = err;
            if (!error) alert('Usuário cadastrado!');
        }

        if (error) {
            msgDiv.className = 'mt-3 text-sm text-red-600';
            msgDiv.innerText = `Erro: ${error.message}`;
            msgDiv.classList.remove('hidden');
        } else {
            limparFormulario();
            carregarUsuarios();
        }
    }

    window.editarUsuario = async function(id) {
        const { data, error } = await supabase.from('usuarios').select('*').eq('id', id).single();
        if (error) { alert('Erro: ' + error.message); return; }
        document.getElementById('userId').value = data.id;
        document.getElementById('nome').value = data.nome || '';
        document.getElementById('sobrenome').value = data.sobrenome || '';
        document.getElementById('data_nascimento').value = data.data_nascimento || '';
        document.getElementById('genero').value = data.genero || '';
        document.getElementById('whatsapp').value = data.whatsapp || '';
        document.getElementById('email').value = data.email || '';
        document.getElementById('status').value = data.status || 'ativo';
        document.getElementById('formTitle').innerText = '✏️ Editar usuário';
        document.getElementById('cancelEdit').classList.remove('hidden');
        window.scrollTo({ top: 0, behavior: 'smooth' });
    };

    window.confirmarExclusao = function(id, nome) {
        deleteUserId = id;
        document.getElementById('deleteUserName').innerText = nome;
        document.getElementById('deleteModal').style.display = 'flex';
        document.getElementById('deleteModal').classList.remove('hidden');
    };

    async function excluirUsuario() {
        if (!deleteUserId) return;
        const { error } = await supabase.from('usuarios').delete().eq('id', deleteUserId);
        if (error) alert('Erro: ' + error.message);
        else { alert('Excluído!'); carregarUsuarios(); }
        fecharModal();
    }

    function limparFormulario() {
        document.getElementById('userForm').reset();
        document.getElementById('userId').value = '';
        document.getElementById('formTitle').innerText = '➕ Novo usuário';
        document.getElementById('cancelEdit').classList.add('hidden');
        document.getElementById('formMessage').classList.add('hidden');
    }

    function fecharModal() {
        document.getElementById('deleteModal').style.display = 'none';
        document.getElementById('deleteModal').classList.add('hidden');
        deleteUserId = null;
    }

    // Eventos
    document.getElementById('userForm').addEventListener('submit', salvarUsuario);
    document.getElementById('cancelEdit').addEventListener('click', limparFormulario);
    document.getElementById('confirmDelete').addEventListener('click', excluirUsuario);
    document.getElementById('cancelDelete').addEventListener('click', fecharModal);

    // Inicializar
    carregarUsuarios();
</script>
</body>
</html>
