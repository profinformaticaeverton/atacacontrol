<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>AtacaControl - Dashboard</title>

    <link
        rel="icon"
        href="favicon.svg">

    <link
        rel="stylesheet"
        href="dashboard.css">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>

<body>

    <button
        class="menu-mobile"
        id="menuMobile">

        ☰

    </button>

    <div class="overlay" id="overlay"></div>

    <div class="layout">

        <!-- MENU -->

        <aside class="sidebar" id="sidebar">

            <div class="logo">

                <div class="logo-icon">
                    🛒
                </div>

                <h2>
                    AtacaControl
                </h2>

            </div>

            <nav>

                <button class="menu-btn active">

                    📊 Dashboard

                </button>

                <button
                    class="menu-btn"
                    onclick="window.location.href='nova-compra.html'">

                    🛍️ Nova Compra

                </button>

                <button
                    class="menu-btn"
                    onclick="window.location.href='historico.html'">

                    📜 Histórico

                </button>

                <button class="menu-btn">

                    📈 Relatórios

                </button>

                <button class="menu-btn">

                    👤 Perfil

                </button>

            </nav>

            <button
                class="logout-btn"
                onclick="logout()">

                🚪 Sair

            </button>

        </aside>

        <!-- CONTEÚDO -->

        <main class="content">

            <header class="header">

                <div>

                    <h1>
                        Dashboard
                    </h1>

                    <p>
                        Controle inteligente das suas compras
                    </p>

                </div>

                <div
                    class="usuario"
                    id="userEmail">

                </div>

            </header>

            <!-- INDICADORES -->

            <section class="cards">

                <div class="card">

                    <h3>
                        💰 Total do Mês
                    </h3>

                    <span id="totalMes">
                        R$ 0,00
                    </span>

                </div>

                <div class="card">

                    <h3>
                        🛒 Compras
                    </h3>

                    <span id="qtdCompras">
                        0
                    </span>

                </div>

                <div class="card">

                    <h3>
                        📦 Produtos
                    </h3>

                    <span id="qtdProdutos">
                        0
                    </span>

                </div>

                <div class="card">

                    <h3>
                        🏆 Maior Compra
                    </h3>

                    <span id="maiorCompra">
                        R$ 0,00
                    </span>

                </div>

            </section>

            <!-- AÇÕES -->

            <section class="acoes">

                <button
                    onclick="window.location.href='nova-compra.html'">

                    ➕ Nova Compra

                </button>

                <button
                    onclick="window.location.href='historico.html'">

                    📜 Histórico

                </button>

            </section>

            <!-- ÚLTIMAS COMPRAS -->

            <section class="panel">

                <h2>
                    Últimas Compras
                </h2>

                <div
                    id="ultimasCompras"
                    class="compras-grid">

                    <div class="compra-card">

                        Nenhuma compra encontrada

                    </div>

                </div>

            </section>

        </main>

    </div>

    <script src="config.js"></script>
    <script src="dashboard.js"></script>

</body>

</html>
