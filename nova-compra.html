<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <meta
        name="description"
        content="Registre uma nova compra no Minha Dispensa e acompanhe sua feira do mês com mais controle.">

    <title>
        Nova Compra | Minha Dispensa
    </title>

    <link
        rel="stylesheet"
        href="nova-compra.css">

    <link
        rel="icon"
        href="favicon.svg">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>

<body>

    <div class="app">

        <header class="header">

            <div class="header-actions">

                <button
                    class="btn-voltar"
                    onclick="window.location.href='dashboard.html'">

                    ← Dashboard

                </button>

                <button
                    class="btn-dispensar"
                    onclick="window.location.href='dispensa.html'">

                    🫙 Minha Dispensa

                </button>

                <button
                    class="btn-dispensar btn-lista"
                    onclick="window.location.href='lista-compras.html'">

                    📝 Lista de Compras

                </button>

                <button
                    class="btn-dispensar btn-planejamento"
                    onclick="window.location.href='planejamento-feira.html'">

                    🎯 Planejamento

                </button>

            </div>

            <div class="header-info">

                <span class="page-label">
                    Minha Dispensa
                </span>

                <h1>
                    Nova Compra
                </h1>

                <p>
                    Registre sua feira em tempo real e acompanhe o total antes de salvar.
                </p>

            </div>

        </header>

        <section class="card">

            <div class="card-title">

                <div class="card-icon">
                    🧾
                </div>

                <div>

                    <h2>
                        Informações da Compra
                    </h2>

                    <p>
                        Informe a data, o mercado e observações importantes.
                    </p>

                </div>

            </div>

            <div class="form-grid">

                <div>

                    <label for="dataCompra">
                        Data da Compra
                    </label>

                    <input
                        type="date"
                        id="dataCompra">

                </div>

                <div>

                    <label for="marketSelect">
                        Mercado
                    </label>

                    <select id="marketSelect"></select>

                </div>

            </div>

            <label for="observacoes">
                Observações
            </label>

            <textarea
                id="observacoes"
                rows="4"
                placeholder="Ex.: compra do mês, promoção, feira semanal..."></textarea>

        </section>

        <section class="card search-card">

            <label for="buscaProduto">
                Buscar produto
            </label>

            <div class="busca-container">

                <input
                    type="text"
                    id="buscaProduto"
                    placeholder="🔍 Digite o nome do produto...">

            </div>

        </section>

        <section class="card">

            <div class="titulo-produtos">

                <div>

                    <span class="page-label">
                        Itens da feira
                    </span>

                    <h2>
                        Produtos
                    </h2>

                </div>

                <span id="contadorProdutos">
                    0 produtos
                </span>

            </div>

            <div
                id="listaProdutos"
                class="lista-produtos">

            </div>

        </section>

    </div>

    <div class="resumo-fixo">

        <div class="resumo-info">

            <div>

                <small>
                    Quantidade Total
                </small>

                <strong id="qtdTotal">
                    0
                </strong>

            </div>

            <div>

                <small>
                    Valor Total
                </small>

                <strong id="valorTotal">
                    R$ 0,00
                </strong>

            </div>

        </div>

        <button
            class="btn-salvar"
            onclick="salvarCompra()">

            💾 Salvar Compra

        </button>

    </div>

    <template id="comparadorTemplate">

        <div class="comparador-preco">

            <div class="linha-preco">

                <span class="label-preco">
                    Último preço
                </span>

                <strong class="ultimo-preco">
                    —
                </strong>

            </div>

            <div class="linha-preco">

                <span class="label-preco">
                    Preço atual
                </span>

                <strong class="preco-atual">
                    —
                </strong>

            </div>

            <div class="variacao-preco">
                Aguardando valor...
            </div>

        </div>

    </template>

    <script src="config.js"></script>
    <script src="nova-compra.js"></script>

</body>

</html>
