<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Nova Compra | AtacaControl</title>

    <link
        rel="stylesheet"
        href="nova-compra.css">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>

<body>

    <div class="app">

        <!-- ========================= -->
        <!-- CABEÇALHO -->
        <!-- ========================= -->

        <header class="header">

            <button
                class="btn-voltar"
                onclick="window.location.href='dashboard.html'">

                ← Dashboard

            </button>

            <div class="header-info">

                <h1>Nova Compra</h1>

                <p>
                    Registre sua compra em tempo real
                </p>

            </div>

        </header>

        <!-- ========================= -->
        <!-- DADOS DA COMPRA -->
        <!-- ========================= -->

        <section class="card">

            <h2>Informações da Compra</h2>

            <div class="form-grid">

                <div>

                    <label>
                        Data da Compra
                    </label>

                    <input
                        type="date"
                        id="dataCompra">

                </div>

                <div>

                    <label>
                        Mercado
                    </label>

                    <select id="marketSelect"></select>

                </div>

            </div>

            <label>
                Observações
            </label>

            <textarea
                id="observacoes"
                rows="4"
                placeholder="Observações da compra..."></textarea>

        </section>

        <!-- ========================= -->
        <!-- BUSCA -->
        <!-- ========================= -->

        <section class="card">

            <div class="busca-container">

                <input
                    type="text"
                    id="buscaProduto"
                    placeholder="🔍 Buscar produto...">

            </div>

        </section>

        <!-- ========================= -->
        <!-- PRODUTOS -->
        <!-- ========================= -->

        <section class="card">

            <div class="titulo-produtos">

                <h2>Produtos</h2>

                <span
                    id="contadorProdutos">

                    0 produtos

                </span>

            </div>

            <div
                id="listaProdutos"
                class="lista-produtos">

            </div>

        </section>

    </div>

    <!-- ========================= -->
    <!-- RESUMO FIXO -->
    <!-- ========================= -->

    <div class="resumo-fixo">

        <div class="resumo-info">

            <div>

                <small>
                    Quantidade Total
                </small>

                <strong id="qtdTotal">
                    0
                </strong>

            </div>

            <div>

                <small>
                    Valor Total
                </small>

                <strong id="valorTotal">
                    R$ 0,00
                </strong>

            </div>

        </div>

        <button
            class="btn-salvar"
            onclick="salvarCompra()">

            💾 Salvar Compra

        </button>

    </div>

    <script src="config.js"></script>
    <script src="nova-compra.js"></script>

</body>

</html>
