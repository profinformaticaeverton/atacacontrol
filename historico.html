<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <meta
        name="description"
        content="Histórico de compras do Minha Dispensa: consulte compras anteriores, filtre por mercado e veja detalhes da feira.">

    <title>
        Histórico | Minha Dispensa
    </title>

    <link
        rel="stylesheet"
        href="historico.css">

    <link
        rel="icon"
        href="favicon.svg">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>

<body>

    <div class="app">

        <header class="header">

            <div class="header-actions">

                <button
                    class="btn-voltar"
                    onclick="window.location.href='dashboard.html'">

                    ← Dashboard

                </button>

                <button
                    class="btn-secundario"
                    onclick="window.location.href='dispensa.html'">

                    🫙 Minha Dispensa

                </button>

                <button
                    class="btn-secundario"
                    onclick="window.location.href='lista-compras.html'">

                    📝 Lista de Compras

                </button>

                <button
                    class="btn-secundario"
                    onclick="window.location.href='planejamento-feira.html'">

                    🎯 Planejamento

                </button>

            </div>

            <div class="header-info">

                <span class="page-label">
                    Minha Dispensa
                </span>

                <h1>
                    Histórico de Compras
                </h1>

                <p>
                    Consulte suas compras anteriores, acompanhe seus gastos
                    e veja os detalhes de cada feira registrada.
                </p>

            </div>

        </header>

        <section class="card">

            <div class="card-title">

                <div class="card-icon">
                    🔎
                </div>

                <div>

                    <h2>
                        Filtros
                    </h2>

                    <p>
                        Encontre compras por mercado ou período.
                    </p>

                </div>

            </div>

            <div class="filtros-grid">

                <div>

                    <label for="buscaMercado">
                        Buscar Mercado
                    </label>

                    <input
                        type="text"
                        id="buscaMercado"
                        placeholder="Digite o nome do mercado">

                </div>

                <div>

                    <label for="dataInicial">
                        Data Inicial
                    </label>

                    <input
                        type="date"
                        id="dataInicial">

                </div>

                <div>

                    <label for="dataFinal">
                        Data Final
                    </label>

                    <input
                        type="date"
                        id="dataFinal">

                </div>

            </div>

            <button
                class="btn-filtrar"
                onclick="filtrarCompras()">

                🔎 Filtrar compras

            </button>

        </section>

        <section class="card">

            <div class="resumo-topo">

                <div>

                    <small>
                        Compras Encontradas
                    </small>

                    <strong id="totalCompras">
                        0
                    </strong>

                </div>

                <div>

                    <small>
                        Valor Total
                    </small>

                    <strong id="valorCompras">
                        R$ 0,00
                    </strong>

                </div>

            </div>

        </section>

        <section>

            <div class="lista-header">

                <div>

                    <span class="page-label">
                        Registros
                    </span>

                    <h2>
                        Compras salvas
                    </h2>

                </div>

                <button
                    class="btn-nova-compra"
                    onclick="window.location.href='nova-compra.html'">

                    ➕ Nova Compra

                </button>

            </div>

            <div
                id="listaCompras"
                class="lista-compras">

            </div>

        </section>

    </div>

    <div
        id="modalDetalhes"
        class="modal">

        <div class="modal-content">

            <div class="modal-header">

                <div>

                    <span class="page-label">
                        Detalhes
                    </span>

                    <h2>
                        Detalhes da Compra
                    </h2>

                </div>

                <button
                    class="btn-fechar"
                    onclick="fecharModal()"
                    aria-label="Fechar detalhes da compra">

                    ✕

                </button>

            </div>

            <div
                id="detalhesCompra">

            </div>

        </div>

    </div>

    <script src="config.js"></script>
    <script src="historico.js"></script>

</body>

</html>
